<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito - GameHub</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body class="bg-light" data-page="cart">
    <nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fa-solid fa-gamepad me-2"></i>GameHub
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="orders.html">Mis pedidos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="admin.html">Administracion</a>
            </li>
          </ul>

          <ul class="navbar-nav me-3">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Iniciar sesion</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html">Registrarse</a>
            </li>
          </ul>

          <a
            class="nav-link position-relative text-white"
            href="shopping-cart.html"
          >
            <i class="fa-solid fa-cart-shopping fa-lg"></i>
            <span
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-secondary"
              data-cart-count
            >
              0
            </span>
          </a>
        </div>
      </div>
    </nav>

    <div class="container my-4">
      <div id="appFeedback" class="alert alert-primary d-none feedback-sticky" role="alert"></div>
    </div>

    <div class="container my-5">
      <h2 class="mb-4 text-dark">Carrito de Compras</h2>

      <div id="cartItems"></div>

      <div
        class="d-flex justify-content-end align-items-center mt-4 pt-3 border-top cart-summary"
      >
        <div class="text-end me-4">
          <p class="mb-1 text-muted">Productos: <span id="cartItemCount">0</span></p>
          <h4 class="mb-0">
            Total: <span class="text-dark" id="cartTotal">$0.00</span>
          </h4>
        </div>
        <button class="btn btn-dark btn-lg" id="checkoutBtn" type="button">
          Finalizar Compra
        </button>
      </div>

      <div class="mt-3 text-end">
        <a href="index.html" class="btn btn-outline-dark">Seguir comprando</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      (async () => {
        try {
          const r = await fetch('./backend.url');
          if (r.ok) {
            const text = (await r.text()).trim();
            if (text) window.BACKEND_URL = text;
          }
        } catch (e) {}
        const m = await import('./js/app.js');
        if (m && typeof m.bootstrap === 'function') m.bootstrap();
      })();
    </script>
  </body>
</html>

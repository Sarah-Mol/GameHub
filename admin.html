<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administracion - GameHub</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body class="bg-light" data-page="admin">
    <nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <i class="fa-solid fa-gamepad me-2"></i>GameHub
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="orders.html">Mis pedidos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="admin.html">Administracion</a>
            </li>
          </ul>

          <a
            class="nav-link position-relative text-white"
            href="shopping-cart.html"
          >
            <i class="fa-solid fa-cart-shopping fa-lg"></i>
            <span
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-secondary"
              data-cart-count
            >
              0
            </span>
          </a>
        </div>
      </div>
    </nav>

    <div class="container my-4">
      <div id="appFeedback" class="alert alert-primary d-none feedback-sticky" role="alert"></div>
    </div>

    <div class="container my-5">
      <div class="row g-4">
        <div class="col-12 col-lg-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <h2 class="h4 mb-4">CRUD de Productos</h2>
              <form id="adminProductForm" class="needs-validation" novalidate>
                <input type="hidden" name="productId" value="" />

                <div class="mb-3">
                  <label class="form-label" for="productName">Nombre</label>
                  <input
                    class="form-control"
                    id="productName"
                    name="productName"
                    type="text"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label" for="productPrice">Precio</label>
                  <input
                    class="form-control"
                    id="productPrice"
                    name="productPrice"
                    type="number"
                    min="0.01"
                    step="0.01"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label" for="productImage">Imagen URL</label>
                  <input
                    class="form-control"
                    id="productImage"
                    name="productImage"
                    type="url"
                    required
                  />
                </div>

                <div class="d-flex gap-2 flex-wrap">
                  <button class="btn btn-dark" type="submit" name="submitButton">
                    Crear producto
                  </button>
                  <button
                    class="btn btn-outline-secondary d-none"
                    type="button"
                    name="cancelEdit"
                  >
                    Cancelar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-8">
          <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h2 class="h4 mb-0">Lista de Productos</h2>
            <span class="text-muted">Catalogo consumido por la tienda</span>
          </div>
          <div class="row g-3" id="adminProductList"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
